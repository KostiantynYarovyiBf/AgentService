# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Build Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  OS_TYPE: Linux

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          iproute2 \
          libcurl4-openssl-dev \
          libssl-dev \
          wireguard-tools \
          libmnl-dev \
          nlohmann-json3-dev \
          libboost-all-dev \
          libnl-3-dev \
          libnl-route-3-dev \
          pkg-config \
          cmake \
          g++

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python test dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}  -DCMAKE_SYSTEM_NAME=${{env.OS_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Package with CPack
      run: |
        cd build
        cpack
    - name: Upload package
      uses: actions/upload-artifact@v4
      with:
        name: AgentService-package
        path: build/*.deb

    - name: Run Linux integration tests
      run: |
        python -m pytest -s -vv tests/integration/linux/test_two_peers_init.py

    - name: Cleanup integration environment
      if: always()
      run: |
        sudo ./tests/integration/linux/fixtures/cleanup_env.sh --quiet || true

